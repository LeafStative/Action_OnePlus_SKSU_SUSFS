name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Manifest repo'
        required: false
      branch:
        description: 'Manifest repo branch'
        required: true
        default: 'oneplus/sm8475'
      file:
        description: 'Manifest file name'
        required: true
        default: 'oneplus_ace2_b.xml'
      kernel_suffix:
        description: 'Kernel suffix'
        required: true
        default: '-android12-9-o-g420fe2863fc1-hath'
      codename:
        description: 'CPU codename'
        required: true
        default: 'waipio'
      bbr_ecn:
        description: "Enable BBR+ECN"
        required: true
        type: boolean
        default: true
      netfilter:
        description: "Enable Netfilter features"
        required: true
        type: boolean
        default: true
      baseband_guard_enable:
        description: "Enable Baseband-guard"
        required: true
        type: boolean
        default: true
      sukisu_enable:
        description: "Enable ReSukiSU"
        required: true
        type: boolean
        default: true
      sukisu_hook:
        description: 'SUSFS / Hook type selection'
        required: true
        type: choice
        default: susfs
        options:
          - susfs
          - manual
          - tracepoint
      upload_telegram:
        description: "Upload build artifacts to Telegram"
        required: true
        type: boolean
        default: true

permissions: 
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: python3 git curl dos2unix
          execute_install_scripts: true

      - name: Configure Git
        run: |
          git config --global user.name "LeafStative"
          git config --global user.email "leafstative@gmail.com"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure init arguments
        id: init_args
        run: |
          args=''
          output_string=`echo '_${{ inputs.file }}' | sed -E 's/(_[a-z])?\.xml$//'`

          if [[ '${{ inputs.repo }}' ]]; then
            args+=" -r '${{ inputs.repo }}'"
          fi

          if [[ '${{ inputs.bbr_ecn }}' == true ]]; then
            args+=' -e'
            output_string+='_BBR'
          fi

          if [[ '${{ inputs.netfilter }}' == true ]]; then
            args+=' -n'
            output_string+='_NF'
          fi

          if [[ '${{ inputs.baseband_guard_enable }}' == true ]]; then
            args+=' -B'
            output_string+='_BBG'
          fi

          if [[ '${{ inputs.sukisu_enable }}' == true ]]; then
            args+=' -k'
            output_string+='_SKSU'

            case '${{ inputs.sukisu_hook }}' in
              susfs)
                output_string+='_SUSFS'
                ;;
              manual)
                args+=' -H manual'
                output_string+='_MANUAL'
                ;;
              tracepoint)
                args+=' -H tracepoint'
                output_string+='_TRACEPOINT'
                ;;
            esac
          fi

          echo "args=$args" >> $GITHUB_OUTPUT
          echo "output_string=$output_string" >> $GITHUB_OUTPUT

      - name: Init
        run: |
          ./scripts/init.sh \
            -b '${{ inputs.branch }}' \
            -f '${{ inputs.file }}' \
            -s '${{ inputs.kernel_suffix }}' \
            -c '${{ inputs.codename }}'${{ steps.init_args.outputs.args }}

      - name: Download source code
        run: ./scripts/download_src.sh

      - name: Apply patches
        run: ./scripts/apply_patches.sh

      - name: Build kernel
        run: ./scripts/build.sh

      - name: Make AnyKernel3
        run: ./scripts/make_ak3.sh

      - name: Download ReSukiSU Manager
        run: ./scripts/download_manager.sh

      - name: Prepare files for upload
        id: pre_upload
        run: |
          filename_suffix='${{ steps.init_args.outputs.output_string }}${{ inputs.kernel_suffix }}'
          manager_file=$(find ./workspace/artifacts -name "ReSukiSU_*-arm64-v8a-release.apk" | head -n 1)

          cp ./workspace/AnyKernel3.zip "./workspace/artifacts/AnyKernel3${filename_suffix}.zip"
          cp ./workspace/out/dist/Image "./workspace/artifacts/Image${filename_suffix}"

          echo "filename_suffix=${filename_suffix}" >> $GITHUB_OUTPUT
          echo "manager_file=${manager_file}" >> $GITHUB_OUTPUT

      - name: Upload ReSukiSU Manager
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.pre_upload.outputs.manager_file }}
          archive: false

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v7
        with:
          path: ./workspace/artifacts/AnyKernel3${{ steps.pre_upload.outputs.filename_suffix }}.zip
          archive: false

      - name: Upload kernel
        uses: actions/upload-artifact@v7
        with:
          path: ./workspace/artifacts/Image${{ steps.pre_upload.outputs.filename_suffix }}
          archive: false

      - name: Upload to Telegram
        if: inputs.upload_telegram
        uses: xz-dev/TelegramFileUploader@v1
        with:
          to-who: ${{ secrets.TELEGRAM_CHAT_ID }}
          files: |
            ${{ steps.pre_upload.outputs.manager_file }}
            ./workspace/artifacts/AnyKernel3${{ steps.pre_upload.outputs.filename_suffix }}.zip
            ./workspace/artifacts/Image${{ steps.pre_upload.outputs.filename_suffix }}
          message: |
            New kernel build.

            **Repository:** ${{ inputs.repo }}
            **Branch:** ${{ inputs.branch }}
            **File:** ${{ inputs.file }}
            **Kernel Suffix:** ${{ inputs.kernel_suffix }}
            **Codename:** ${{ inputs.codename }}
            **BBR+ECN:** ${{ inputs.bbr_ecn }}
            **Netfilter:** ${{ inputs.netfilter }}
            **BBG:** ${{ inputs.baseband_guard_enable }}
            **ReSukiSU:** ${{ inputs.sukisu_enable }}
            **SuSFS/Hook Type:** ${{ inputs.sukisu_hook }}
        env:
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
